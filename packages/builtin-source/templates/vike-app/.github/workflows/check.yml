name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: corepack enable
      - run: pnpm install
      - run: pnpm --filter ./apps/web exec playwright install --with-deps chromium
      - run: pnpm run check

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx build --load --file apps/web/Dockerfile --target runtime --tag vike-app:check .
      - run: docker buildx build --load --file apps/web/Dockerfile --target database-preparation --tag vike-app-db-prepare:check .

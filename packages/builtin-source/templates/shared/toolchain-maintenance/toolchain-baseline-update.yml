name: Toolchain Baseline Update

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: toolchain-baseline-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - id: desired-toolchain
        run: node scripts/update-toolchain-baseline.ts --print-workflow-outputs >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.desired-toolchain.outputs.node-major }}
      - run: corepack enable
      - run: node scripts/update-toolchain-baseline.ts
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

[package]
name = "{{CARGO_PACKAGE_NAME}}"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"

[lints]
workspace = true

[workspace]
members = ["."]
resolver = "3"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "deny"
pedantic = "deny"
nursery = "deny"

[profile.release]
strip = "symbols"
lto = "thin"
codegen-units = 1

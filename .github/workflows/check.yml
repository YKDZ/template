name: Check

on:
  pull_request:
  push:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: Check package and fixture matrix
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package
        run: pnpm run check

      - name: Check fixture matrix
        run: pnpm run check:fixtures

name: Toolchain Resolution Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: toolchain-baseline-update
  cancel-in-progress: false

jobs:
  check:
    name: Check online toolchain resolution
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check online toolchain resolution contract
        run: pnpm run check:toolchain:online

      - name: Resolve updater toolchain
        id: desired-toolchain
        run: node packages/checks/src/update-toolchain-baseline.ts --print-workflow-outputs >> "$GITHUB_OUTPUT"

      - name: Set up resolved Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.desired-toolchain.outputs.node-major }}

      - name: Provision resolved pnpm
        run: corepack install --global "${{ steps.desired-toolchain.outputs.pnpm-pin }}"

      - name: Refresh Toolchain Baseline candidate
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
        run: pnpm run update:toolchain
